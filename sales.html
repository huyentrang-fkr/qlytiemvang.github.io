    <style>
        :root {
            --dark-teal: #0d2b2d;
            --card-bg: #164245;
            --accent-gold: #ffc107;
        }

        body { background-color: var(--dark-teal); color: white; font-family: 'Segoe UI', sans-serif; }

        .sales-header { 
            background: linear-gradient(135deg, #164245 0%, #0d2b2d 100%); 
            color: white; padding: 50px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .invoice-card { 
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            transition: all 0.3s; 
            cursor: pointer; 
            border-left: 5px solid var(--accent-gold) !important; 
        }
        .invoice-card:hover { 
            background: rgba(255,255,255,0.1); 
            transform: translateY(-3px); 
        }

        .filter-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-content {
            background: var(--card-bg);
            color: white;
            border-radius: 25px;
            border: 1px solid var(--accent-gold);
        }

        .navbar { margin: 20px; border-radius: 50px; background: rgba(22, 66, 69, 0.9) !important; padding: 10px 30px; }
    </style>
</head>

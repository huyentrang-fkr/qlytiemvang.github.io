<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Giao Dịch - Tiệm Vàng 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --dark-teal: #0d2b2d;
            --accent-gold: #ffc107;
        }
        body { background-color: var(--dark-teal); color: white; font-family: 'Segoe UI', sans-serif; }
        .sales-header { background: linear-gradient(135deg, #164245 0%, #0d2b2d 100%); padding: 60px 0; }
        .filter-panel { background: #164245; border-radius: 20px; padding: 25px; }
        .table th { background: #1e3a3c; color: #ffc107; }
        .table td { vertical-align: middle; }
    </style>
    <script src="data.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">💎 TIỆM VÀNG 2026</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Trang Chủ</a>
                <a class="nav-link" href="inventory.html">Kho Hàng</a>
                <a class="nav-link active" href="sales.html">Hóa Đơn</a>
            </div>
        </div>
    </nav>

    <header class="sales-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">NHẬT KÝ GIAO DỊCH</h1>
            <p class="lead opacity-75">Quản lý doanh thu và lịch sử mua bán chi tiết</p>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row g-4">

            <!-- PHẦN TRA CỨU KHÁCH HÀNG -->
            <div class="col-md-4">
                <div class="filter-panel">
                    <h5 class="text-warning mb-3"><i class="bi bi-search"></i> Tra cứu khách hàng</h5>
                    <input type="text" id="searchCustomer" class="form-control bg-dark text-white border-0 mb-3" 
                           placeholder="Tên khách hàng hoặc mã KH..." onkeyup="if(event.key==='Enter') filterSales()">
                    
                    <button onclick="filterSales()" class="btn btn-warning w-100 mb-2">
                        <i class="bi bi-search"></i> Tìm kiếm
                    </button>
                    <button onclick="resetSales()" class="btn btn-outline-light w-100">
                        <i class="bi bi-arrow-clockwise"></i> Reset
                    </button>
                </div>
            </div>

            <!-- BẢNG HÓA ĐƠN -->
            <div class="col-md-8">
                <div class="table-responsive">
                    <table class="table table-dark table-hover" id="salesTable">
                        <thead>
                            <tr>
                                <th>Mã GD</th>
                                <th>Ngày</th>
                                <th>Nhân viên</th>
                                <th>Khách hàng</th>
                                <th>Hàng hóa</th>
                                <th class="text-center">SL</th>
                                <th class="text-end">Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody id="salesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderSales(filteredData = HoaDonGiaoDich) {
            const tbody = document.getElementById('salesBody');
            let html = '';

            filteredData.forEach(gd => {
                const nv = NhanVien.find(n => n.MaNV === gd.MaNV) || { HoTen: 'N/A' };
                const hh = HangHoa.find(h => h.MaHH === gd.MaHH) || { Ten: 'N/A' };

                html += `
                    <tr>
                        <td><strong>${gd.MaGD}</strong></td>
                        <td>${gd.ThoiGian}</td>
                        <td>${nv.HoTen}</td>
                        <td>${gd.TenKH}</td>
                        <td>${hh.Ten}</td>
                        <td class="text-center">${gd.SoLuong}</td>
                        <td class="text-end fw-bold text-warning">
                            ${gd.ThanhTienSauGiam.toLocaleString('vi-VN')} đ
                        </td>
                    </tr>`;
            });

            if (filteredData.length === 0) {
                html = `<tr><td colspan="7" class="text-center py-5 text-muted">Không tìm thấy hóa đơn nào</td></tr>`;
            }

            tbody.innerHTML = html;
        }

        function filterSales() {
            const keyword = document.getElementById('searchCustomer').value.toLowerCase().trim();

            if (!keyword) {
                renderSales(HoaDonGiaoDich);
                return;
            }

            const filtered = HoaDonGiaoDich.filter(gd =>
                gd.TenKH.toLowerCase().includes(keyword) ||
                gd.MaKH.toLowerCase().includes(keyword) ||
                gd.MaGD.toLowerCase().includes(keyword)
            );

            renderSales(filtered);
        }

        function resetSales() {
            document.getElementById('searchCustomer').value = '';
            renderSales(HoaDonGiaoDich);
        }

        // Khởi tạo trang
        window.onload = () => {
            if (typeof HoaDonGiaoDich === 'undefined' || HoaDonGiaoDich.length === 0) {
                document.getElementById('salesBody').innerHTML = 
                    `<tr><td colspan="7" class="text-danger text-center py-5">Lỗi: Chưa load được dữ liệu từ data.js</td></tr>`;
                return;
            }
            renderSales();
            console.log("%c✅ Nhật ký giao dịch đã tải thành công - 19 hóa đơn", "color:#ffc107;font-weight:bold");
        };
    </script>
</body>
</html>

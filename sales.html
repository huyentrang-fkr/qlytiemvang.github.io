<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Hóa Đơn - Tiệm Vàng 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .sales-header { background: #198754; color: white; padding: 30px 0; border-bottom: 5px solid #146c43; }
        .invoice-card { transition: all 0.2s; cursor: pointer; border-left: 5px solid #198754; }
        .invoice-card:hover { background-color: #f8f9fa; transform: scale(1.01); }
        .badge-vip { background-color: #ffd700; color: #000; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">💎 TRANG CHỦ</a>
            <div class="navbar-nav">
                <a class="nav-link" href="inventory.html">Kho Hàng</a>
                <a class="nav-link active" href="sales.html">Hóa Đơn</a>
            </div>
        </div>
    </nav>

    <header class="sales-header text-center shadow-sm">
        <div class="container">
            <h1 class="fw-bold">NHẬT KÝ GIAO DỊCH</h1>
            <p>Quản lý doanh thu và lịch sử mua hàng của khách hàng</p>
        </div>
    </header>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <h6 class="fw-bold mb-3">Tra cứu khách hàng</h6>
                        <input type="text" id="custSearch" class="form-control mb-3" placeholder="Nhập tên khách hàng..." onkeyup="filterSales()">
                        
                        <h6 class="fw-bold mb-3">Lọc theo năm</h6>
                        <select id="yearFilter" class="form-select" onchange="filterSales()">
                            <option value="all">Tất cả thời gian</option>
                            <option value="2026">Năm 2026</option>
                            <option value="2025">Năm 2025</option>
                        </select>
                    </div>
                </div>

                <div class="alert alert-info">
                    <small><strong>Gợi ý:</strong> Thử tìm khách hàng <strong>"Hoàng Thị Ngọc"</strong> để xem các giao dịch giá trị cao.</small>
                </div>
            </div>

            <div class="col-md-8">
                <div id="salesContainer">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" id="modalContent">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script>
        function renderSales(data) {
            const container = document.getElementById('salesContainer');
            if (data.length === 0) {
                container.innerHTML = '<div class="text-center p-5 bg-white rounded shadow-sm">Không tìm thấy hóa đơn nào.</div>';
                return;
            }

            let html = '';
            data.forEach(hd => {
                html += `
                    <div class="card invoice-card shadow-sm mb-3 border-0" onclick="showInvoiceDetail('${hd.MaGD}')">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <span class="badge bg-dark mb-2">${hd.MaGD}</span>
                                <h5 class="m-0 fw-bold">${hd.TenKH}</h5>
                                <small class="text-muted"><i class="bi bi-calendar"></i> Ngày GD: ${hd.ThoiGian}</small>
                            </div>
                            <div class="text-end">
                                <div class="text-success fw-bold h5 m-0">${hd.ThanhTienSauGiam.toLocaleString()} đ</div>
                                <small class="text-muted">Nhân viên: ${hd.MaNV}</small>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function filterSales() {
            const name = document.getElementById('custSearch').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;

            const filtered = HoaDonGiaoDich.filter(hd => {
                const matchName = hd.TenKH.toLowerCase().includes(name);
                const matchYear = year === 'all' ? true : hd.ThoiGian.startsWith(year);
                return matchName && matchYear;
            });

            renderSales(filtered);
        }

        function showInvoiceDetail(maGD) {
            const hd = HoaDonGiaoDich.find(x => x.MaGD === maGD);
            const modal = new bootstrap.Modal(document.getElementById('invoiceModal'));
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Chi Tiết Hóa Đơn ${hd.MaGD}</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Khách hàng:</strong> ${hd.TenKH}</p>
                    <p><strong>Ngày mua:</strong> ${hd.ThoiGian}</p>
                    <hr>
                    <table class="table table-sm">
                        <thead><tr><th>Mặt hàng</th><th class="text-end">Thành tiền</th></tr></thead>
                        <tbody>
                            <tr>
                                <td>Mã sản phẩm: ${hd.MaHH} (SL: ${hd.SoLuong})</td>
                                <td class="text-end">${hd.ThanhTienSauGiam.toLocaleString()} đ</td>
                            </tr>
                        </tbody>
                    </table>
                    <h5 class="text-end text-danger fw-bold mt-3">TỔNG: ${hd.ThanhTienSauGiam.toLocaleString()} đ</h5>
                </div>
            `;
            modal.show();
        }

        window.onload = () => renderSales(HoaDonGiaoDich);
    </script>
</body>
</html>

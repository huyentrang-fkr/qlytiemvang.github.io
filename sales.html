<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Giao Dịch - Tiệm Vàng 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --dark-teal: #0d2b2d;
            --card-bg: #164245;
            --accent-gold: #ffc107;
        }
        body { 
            background-color: var(--dark-teal); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .sales-header { 
            background: linear-gradient(135deg, #164245 0%, #0d2b2d 100%); 
            color: white; padding: 50px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        /* Filter Panel */
        .filter-panel {
            background: rgba(22, 66, 69, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,193,7,0.2);
            padding: 24px;
            height: fit-content;
        }

        /* Bảng lớn hơn, tối màu */
        .sales-table-container {
            background: rgba(22, 66, 69, 0.85);     /* Đậm hơn nền một chút */
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
        }

        #salesTable {
            margin-bottom: 0;
        }

        #salesTable thead th {
            background: rgba(255, 193, 7, 0.12);
            color: var(--accent-gold);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.87rem;
            padding: 20px 12px;
            border-bottom: 2px solid rgba(255,193,7,0.3);
        }

        #salesTable tbody td {
            padding: 18px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            color: #e0e0e0;                    /* Màu sáng hơn nền một chút */
        }

        #salesTable tbody tr:hover {
            background: rgba(255, 193, 7, 0.09);
            transition: all 0.3s ease;
        }

        #salesTable td.text-end {
            color: #ffc107;
            font-weight: 700;
            font-size: 1.08rem;
        }

        #salesTable td strong {
            color: #4db6ac;
            font-family: monospace;
        }

        .form-select, .form-control {
            background-color: #0f2a2c;
            color: white;
            border: 1px solid #26a69a;
        }

        .form-select:focus, .form-control:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 0.2rem rgba(255,193,7,0.25);
        }
    </style>
    <script src="data.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">💎 TIỆM VÀNG 2026</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Trang Chủ</a>
                <a class="nav-link" href="inventory.html">Kho Hàng</a>
                <a class="nav-link active" href="sales.html">Hóa Đơn</a>
            </div>
        </div>
    </nav>

    <header class="sales-header text-center">
        <div class="container">
            <h1 class="fw-bold display-5">NHẬT KÝ GIAO DỊCH</h1>
            <p class="opacity-75">Quản lý doanh thu và lịch sử mua bán</p>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row g-4">
            <!-- Phần lọc -->
            <div class="col-lg-4">
                <div class="filter-panel">
                    <h5 class="fw-bold mb-4 text-warning">
                        <i class="bi bi-funnel-fill me-2"></i>LỌC HÓA ĐƠN
                    </h5>

                    <div class="mb-3">
                        <label class="form-label text-light">Chọn Năm</label>
                        <select id="yearFilter" class="form-select" onchange="filterSales()">
                            <option value="all">Tất cả các năm</option>
                            <option value="2025">Năm 2025</option>
                            <option value="2026" selected>Năm 2026</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">Tra cứu khách hàng</label>
                        <input type="text" id="searchCustomer" 
                               class="form-control" 
                               placeholder="Tên hoặc mã khách hàng..." 
                               onkeyup="if(event.key==='Enter') filterSales()">
                    </div>

                    <div class="d-grid gap-2">
                        <button onclick="filterSales()" class="btn btn-warning py-2">
                            <i class="bi bi-search"></i> Tìm kiếm
                        </button>
                        <button onclick="resetSales()" class="btn btn-outline-light py-2">
                            <i class="bi bi-arrow-clockwise"></i> Reset tất cả
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bảng hóa đơn to hơn -->
            <div class="col-lg-8">
                <div class="sales-table-container">
                    <div class="table-responsive">
                        <table class="table table-hover" id="salesTable">
                            <thead>
                                <tr>
                                    <th>MÃ GD</th>
                                    <th>NGÀY</th>
                                    <th>NHÂN VIÊN</th>
                                    <th>KHÁCH HÀNG</th>
                                    <th>HÀNG HÓA</th>
                                    <th class="text-center">SL</th>
                                    <th class="text-end">THÀNH TIỀN</th>
                                </tr>
                            </thead>
                            <tbody id="salesBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function renderSales(filteredData = HoaDonGiaoDich) {
            const tbody = document.getElementById('salesBody');
            let html = '';

            filteredData.forEach(gd => {
                const nv = NhanVien.find(n => n.MaNV === gd.MaNV) || { HoTen: 'N/A' };
                const hh = HangHoa.find(h => h.MaHH === gd.MaHH) || { Ten: 'N/A' };

                html += `
                    <tr>
                        <td><strong>${gd.MaGD}</strong></td>
                        <td>${gd.ThoiGian}</td>
                        <td>${nv.HoTen}</td>
                        <td>${gd.TenKH}</td>
                        <td>${hh.Ten}</td>
                        <td class="text-center">${gd.SoLuong}</td>
                        <td class="text-end fw-bold">${gd.ThanhTienSauGiam.toLocaleString('vi-VN')} đ</td>
                    </tr>`;
            });

            if (filteredData.length === 0) {
                html = `<tr><td colspan="7" class="text-center py-5 text-muted">Không tìm thấy hóa đơn nào phù hợp</td></tr>`;
            }

            tbody.innerHTML = html;
        }

        function filterSales() {
            const year = document.getElementById('yearFilter').value;
            const keyword = document.getElementById('searchCustomer').value.toLowerCase().trim();

            let filtered = HoaDonGiaoDich;

            if (year !== 'all') {
                filtered = filtered.filter(gd => gd.ThoiGian.startsWith(year));
            }

            if (keyword) {
                filtered = filtered.filter(gd => 
                    gd.TenKH.toLowerCase().includes(keyword) || 
                    gd.MaKH.toLowerCase().includes(keyword)
                );
            }

            renderSales(filtered);
        }

        function resetSales() {
            document.getElementById('yearFilter').value = 'all';
            document.getElementById('searchCustomer').value = '';
            renderSales(HoaDonGiaoDich);
        }

        window.onload = () => {
            if (typeof HoaDonGiaoDich === 'undefined') {
                document.getElementById('salesBody').innerHTML = 
                    `<tr><td colspan="7" class="text-danger text-center py-5">Lỗi: Không load được dữ liệu từ data.js</td></tr>`;
                return;
            }
            renderSales();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Giao Dịch - Tiệm Vàng 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --dark-teal: #0d2b2d;
            --accent-gold: #ffc107;
        }
        body { background-color: var(--dark-teal); color: white; font-family: 'Segoe UI', sans-serif; }
        .sales-header { background: linear-gradient(135deg, #164245 0%, #0d2b2d 100%); padding: 60px 0; }
        .filter-panel { background: #164245; border-radius: 20px; padding: 25px; }
        .table th { background: #1e3a3c; color: #ffc107; }
        .table td { vertical-align: middle; }
        .total-row { background: rgba(255,193,7,0.1); font-weight: bold; }
    </style>
    <script src="data.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">💎 TIỆM VÀNG 2026</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Trang Chủ</a>
                <a class="nav-link" href="inventory.html">Kho Hàng</a>
                <a class="nav-link active" href="sales.html">Hóa Đơn</a>
            </div>
        </div>
    </nav>

    <header class="sales-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">NHẬT KÝ GIAO DỊCH</h1>
            <p class="lead opacity-75">Quản lý doanh thu và lịch sử mua bán chi tiết</p>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row g-4">

            <!-- Tra cứu khách hàng -->
            <div class="col-md-4">
                <div class="filter-panel">
                    <h5 class="text-warning mb-3"><i class="bi bi-search"></i> Tra cứu khách hàng</h5>
                    <input type="text" id="searchCustomer" class="form-control bg-dark text-white border-0 mb-3" 
                           placeholder="Tên khách hàng hoặc mã KH..." onkeyup="if(event.key==='Enter') filterSales()">
                    
                    <button onclick="filterSales()" class="btn btn-warning w-100 mb-2">
                        <i class="bi bi-search"></i> Tìm kiếm
                    </button>
                    <button onclick="resetSales()" class="btn btn-outline-light w-100">
                        <i class="bi bi-arrow-clockwise"></i> Reset
                    </button>
                </div>
            </div>

            <!-- Bảng hóa đơn -->
            <div class="col-md-8">
                <div class="table-responsive">
                    <table class="table table-dark table-hover" id="salesTable">
                        <thead>
                            <tr>
                                <th>Mã GD</th>
                                <th>Ngày</th>
                                <th>Nhân viên</th>
                                <th>Khách hàng</th>
                                <th>Hàng hóa</th>
                                <th class="text-center">SL</th>
                                <th class="text-end">Tổng tiền</th>
                            </tr>
                        </thead>
                        <tbody id="salesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hàm tính tổng tiền từ ChiTietHoaDon cho từng hóa đơn
        function getTotalByGD(maGD) {
            return ChiTietHoaDon
                .filter(ct => ct.MaGD === maGD)
                .reduce((sum, ct) => sum + ct.ThanhTienSauGiam, 0);
        }

        function renderSales(filteredData = HoaDonGiaoDich) {
            const tbody = document.getElementById('salesBody');
            let html = '';

            filteredData.forEach(gd => {
                const nv = NhanVien.find(n => n.MaNV === gd.MaNV) || { HoTen: 'N/A' };
                const total = getTotalByGD(gd.MaGD);

                // Lấy tên hàng hóa (nếu nhiều mặt hàng thì hiển thị "Nhiều mặt hàng")
                const items = ChiTietHoaDon.filter(ct => ct.MaGD === gd.MaGD);
                let tenHang = items.length > 1 
                    ? `Nhiều mặt hàng (${items.length})` 
                    : (HangHoa.find(h => h.MaHH === items[0]?.MaHH)?.Ten || 'N/A');

                html += `
                    <tr>
                        <td><strong>${gd.MaGD}</strong></td>

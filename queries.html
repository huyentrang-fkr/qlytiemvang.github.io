<!DOCTYPE html>
<html lang="vi">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .query-list .list-group-item { cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .query-list .list-group-item:hover { background: #f8f9fa; border-left-color: #ffc107; }
        .query-list .active { background: #fff3cd !important; color: #000; fw-bold; border-left-color: #ffc107; }
        #queryTitle { color: #856404; border-bottom: 2px solid #ffeeba; pb-2; }

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow">

            </div>
        </div>

                    <div class="list-group list-group-flush query-list" id="queryMenu">
                        <button onclick="runQuery(431, this)" class="list-group-item list-group-item-action">4.3.1. Hàng hóa giá > 15.000.000</button>

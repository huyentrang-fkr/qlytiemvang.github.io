<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Gold Shop Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- TOP BAR -->
  <header class="topbar">
    <input type="text" placeholder="Search hàng hóa, hóa đơn...">
    <div class="user">Admin Trang</div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>TIỆM VÀNG</h1>
      <p>Hệ thống quản lý vàng & trang sức</p>
      <button onclick="goTo('products.html')">Xem hàng hóa</button>
    </div>

    <img src="assets/astronaut.png" class="astro">
  </section>

  <!-- MENU -->
  <div class="menu">
    <button onclick="goTo('products.html')">Hàng hóa</button>
    <button onclick="goTo('customers.html')">Khách hàng</button>
    <button onclick="goTo('invoices.html')">Hóa đơn</button>
  </div>

  <!-- CARD -->
  <section class="cards">
    <div class="card">
      <h3>Tổng hàng hóa</h3>
      <p id="totalProducts"></p>
    </div>

    <div class="card">
      <h3>Tổng khách hàng</h3>
      <p id="totalCustomers"></p>
    </div>

    <div class="card">
      <h3>Tổng hóa đơn</h3>
      <p id="totalInvoices"></p>
    </div>
  </section>

</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>

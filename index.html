<div class="app-container">
    <header class="top-bar">
        <div class="search-box">
            <input type="text" placeholder="Search hàng hóa, hóa đơn...">
            <button>🔍</button>
        </div>
        <div class="user-profile">
            <span>Admin Huyển Trang</span>
            <div class="avatar"></div>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1>TIỆM VÀNG <span>2026</span></h1>
            <p>Hệ thống quản lý kho và giao dịch chuyên nghiệp.</p>
            <div class="hero-buttons">
                <button class="btn-primary">Get Started</button>
                <button class="btn-secondary">Accounting</button>
            </div>
        </div>
        <div class="hero-image-placeholder">
            <div class="inner-card">
                <h3>Tỷ giá hôm nay</h3>
                <p>Vàng 9999: 8.600.000đ</p>
            </div>
        </div>
    </section>

    <section class="stats-grid">
        <div class="stat-card gold">
            <div class="icon">📦</div>
            <div>
                <h4>Tổng Kho</h4>
                <h2 id="totalStock">0</h2>
            </div>
            <button class="next-btn">→</button>
        </div>
        <div class="stat-card revenue">
            <div class="icon">💰</div>
            <div>
                <h4>Doanh Thu</h4>
                <h2 id="totalRevenue">0 VNĐ</h2>
            </div>
            <button class="next-btn">→</button>
        </div>
    </section>

    <section class="data-section">
        <div class="section-header">
            <h3>Danh sách sản phẩm</h3>
            <div class="tabs">
                <span class="active">Galaxy</span>
                <span>Green Pea</span>
            </div>
        </div>
        <div class="table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Mã HH</th>
                        <th>Tên Sản Phẩm</th>
                        <th>Giá Trị</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="resultTable">
                    </tbody>
            </table>
        </div>
    </section>
</div>

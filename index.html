<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gold Shop Dashboard - Quản Lý Tiệm Vàng</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* TỐI ƯU HIỂN THỊ: NỔI BẬT CHỮ VÀ DỮ LIỆU */
        .query-section {
            margin-top: 30px;
            background: rgba(10, 35, 37, 0.9);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid #26a69a;
            color: #ffffff;
        }
        .query-select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: #164245;
            color: #ffc107;
            border: 2px solid #26a69a;
            margin-bottom: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        #resultTitle {
            color: #4db6ac;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            color: #ffffff; 
        }
        .result-table th {
            border-bottom: 2px solid #ffc107;
            color: #ffc107;
            text-align: left;
            padding: 12px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .result-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
        }
        .result-table tr:hover {
            background: rgba(38, 166, 154, 0.2);
            transition: 0.3s;
        }
        .astro { 
            width: 220px; 
            filter: drop-shadow(0 0 25px rgba(38, 166, 154, 0.7)); 
        }
        .card h3 { color: #4db6ac !important; }
        .card p { color: #ffffff !important; font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

    <header class="topbar">
        <div class="search-box">
            <input type="text" id="mainSearch" placeholder="Tìm tên hàng, mã khách..." onkeyup="instantSearch()">
        </div>
        <div class="user" style="color: #ffc107; font-weight: bold;">👤 Admin: Lã Huyền Trang</div>
    </header>

    <!-- HERO SECTION ĐÃ SỬA (đúng giao diện bạn muốn) -->
    <section class="hero" style="background: linear-gradient(135deg, #0d2b2d 0%, #164245 100%); 
                                 padding: 80px 40px; border-radius: 30px; margin: 30px 0; 
                                 position: relative; overflow: hidden; display: flex; align-items: center; 
                                 box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        
        <div class="hero-text" style="flex: 1;">
            <h1 style="color: #ffffff; font-size: 3.2rem; margin: 0; line-height: 1.1;">
                TIỆM VÀNG <span style="color: #ffc107;">2026</span>
            </h1>
            <p style="color: #e0e0e0; font-size: 1.3rem; margin: 15px 0 30px 0;">
                Hệ thống quản lý dữ liệu chuyên nghiệp (Nhóm 2)
            </p>
            <button onclick="document.getElementById('querySelector').focus()" 
                    style="background: #ffc107; color: #164245; font-weight: bold; 
                           padding: 16px 32px; border: none; border-radius: 50px; 
                           font-size: 1.1rem; cursor: pointer; box-shadow: 0 6px 15px rgba(255,193,7,0.4);">
                Bắt đầu truy vấn ↓
            </button>
        </div>

        <!-- ẢNH ASTRONAUT -->
        <div style="flex-shrink: 0; text-align: center; margin-left: 40px;">
            <img src="assets/astronaut.png" 
                 class="astro" 
                 alt="Astronaut">
        </div>
    </section>

    <div class="menu">
        <button onclick="location.href='inventory.html'">📦 Kho Hàng</button>
        <button onclick="location.href='customers.html'">👥 Khách hàng</button>
        <button onclick="location.href='sales.html'">📄 Hóa đơn</button>
    </div>

    <section class="cards">
        <div class="card">
            <h3>Tổng hàng tồn</h3>
            <p id="totalProducts">0</p>
        </div>
        <div class="card">
            <h3>Tổng khách hàng</h3>
            <p id="totalCustomers">0</p>
        </div>
        <div class="card">
            <h3>Tổng hóa đơn</h3>
            <p id="totalInvoices">0</p>
        </div>
    </section>

    <section class="query-section">
        <h3 style="margin-bottom: 20px; color: #ffc107; display: flex; align-items: center; gap: 10px;">
            📊 HỆ THỐNG BÁO CÁO CHI TIẾT
        </h3>

        <!-- DANH SÁCH TRUY VẤN -->
        <select id="querySelector" class="query-select" onchange="handleQueryChange()">
            <option value="">-- Chọn truy vấn SQL --</option>
            
            <optgroup label="I. TRUY VẤN HÀNG HÓA">
                <option value="4.3.1">4.3.1. Hàng hóa giá trị > 15.000.000 VNĐ</option>
                <option value="4.3.2">4.3.2. Hàng hóa giá từ 20.000.000 – 40.000.000 VNĐ</option>
                <option value="4.3.3">4.3.3. Hàng hóa thuộc loại Nhẫn hoặc Dây chuyền</option>
                <option value="4.3.4">4.3.4. Top 5 hàng hóa có giá nhỏ nhất</option>
                <option value="4.3.6">4.3.6. Thống kê tồn kho theo nhóm hàng</option>
                <option value="4.3.9">4.3.9. Giá trung bình / thấp nhất / cao nhất</option>
                <option value="4.3.10">4.3.10. Nhóm hàng có giá TB > 20 triệu</option>
            </optgroup>

            <optgroup label="II. TRUY VẤN HÓA ĐƠN &amp; DOANH THU">
                <option value="4.3.7">4.3.7. Hóa đơn từ 24/03/2026 đến 26/03/2026</option>
                <option value="4.3.8">4.3.8. Hóa đơn trong năm 2026</option>
                <option value="4.3.12">4.3.12. Tổng tiền của từng hóa đơn</option>
                <option value="4.3.13">4.3.13. Top 4 hàng hóa bán chạy nhất</option>
                <option value="4.3.14">4.3.14. Top 5 hóa đơn có tổng tiền lớn nhất</option>
                <option value="4.3.19">4.3.19. Tổng doanh thu 01/10/2025 – 01/12/2025</option>
                <option value="4.3.18">4.3.18. Doanh thu theo từng nhân viên</option>
            </optgroup>

            <optgroup label="III. TRUY VẤN KHÁCH HÀNG">
                <option value="4.3.5">4.3.5. Khách hàng và hàng hóa họ đã mua</option>
                <option value="4.3.11">4.3.11. Khách hàng đã mua HH06</option>
                <option value="4.3.15">4.3.15. Chi tiết mua hàng của KH04</option>
                <option value="4.3.16">4.3.16. Khách hàng mua nhiều hàng nhất</option>
            </optgroup>

            <optgroup label="IV. TRUY VẤN KHÁC">
                <option value="4.3.17">4.3.17. Hàng hóa chưa từng được mua</option>
            </optgroup>
        </select>

        <div id="resultArea">
            <h4 id="resultTitle">Sẵn sàng thực thi truy vấn...</h4>
            <div style="overflow-x: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px;">
                <table class="result-table">
                    <thead id="thead"></thead>
                    <tbody id="tbody">
                        <tr><td colspan="5" style="text-align: center; color: #aaa; padding: 40px;">Kết quả truy vấn sẽ hiển thị tại đây...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<script src="data.js"></script>
<script src="js/main.js"></script>

</body>
</html>

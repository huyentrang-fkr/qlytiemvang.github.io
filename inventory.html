<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Kho Hàng - Tiệm Vàng 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/icons/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --dark-teal: #0d2b2d;
            --accent-gold: #ffc107;
            --card-bg: #164245;
        }

        body { background-color: var(--dark-teal); color: white; font-family: 'Segoe UI', sans-serif; }

        /* Header phong cách mới */
        .inventory-header { 
            background: linear-gradient(135deg, #164245 0%, #0d2b2d 100%); 
            padding: 60px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Stats Box hiện đại */
        .stats-box { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border-left: 5px solid var(--accent-gold);
            transition: 0.3s;
        }
        .stats-box:hover { transform: translateY(-5px); }

        /* Bảng dữ liệu Glassmorphism */
        .inventory-card {
            background: rgba(22, 66, 69, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .table { color: white; margin-bottom: 0; }
        .table thead th { 
            background: rgba(0,0,0,0.2); 
            color: var(--accent-gold); 
            border: none;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .table tbody td { padding: 15px; border-color: rgba(255,255,255,0.05); vertical-align: middle; }
        .table-hover tbody tr:hover { background: rgba(255,255,255,0.05); }

        .status-low { color: #ff4d4d; font-weight: bold; background: rgba(255,77,77,0.1); border-radius: 10px; padding: 5px 10px; }
        
        /* Navbar bo tròn */
        .navbar { margin: 20px; border-radius: 50px; background: rgba(22, 66, 69, 0.9) !important; padding: 10px 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">💎 TIỆM VÀNG 2026</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Trang Chủ</a>
                <a class="nav-link active" href="inventory.html">Kho Hàng</a>
                <a class="nav-link" href="sales.html">Hóa Đơn</a>
            </div>
        </div>
    </nav>

    <header class="inventory-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">QUẢN LÝ TỒN KHO</h1>
            <p class="lead opacity-75">Hệ thống theo dõi tài sản và nguyên liệu thời gian thực</p>
        </div>
    </header>

    <div class="container" style="margin-top: -40px;">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stats-box shadow">
                    <div class="text-muted small mb-1">TỔNG VỐN TỒN KHO</div>
                    <h3 id="totalInventoryValue" class="m-0 text-warning">0 đ</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-box shadow" style="border-left-color: #26a69a;">
                    <div class="text-muted small mb-1">MẶT HÀNG SẮP HẾT</div>
                    <h3 id="lowStockCount" class="m-0 text-info">0 loại</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-box shadow" style="border-left-color: #00bcd4;">
                    <div class="text-muted small mb-1">CẬP NHẬT TỶ GIÁ</div>
                    <h3 class="m-0 small">Hôm nay, 2026</h3>
                </div>
            </div>
        </div>

        <div class="inventory-card shadow">
            <div class="card-header border-0 bg-transparent py-4 px-4">
                <div class="row align-items-center">
                    <div class="col">
                        <h4 class="m-0"><i class="bi bi-boxes me-2"></i>Danh Mục Hàng Hóa</h4>
                    </div>
                    <div class="col-auto">
                        <select id="materialFilter" class="form-select bg-dark text-white border-secondary" onchange="filterInventory()">
                            <option value="all">Tất cả nguyên liệu</option>
                            <option value="V9999">Vàng 24K (9999)</option>
                            <option value="V750">Vàng 18K (750)</option>
                            <option value="B925">Bạc 925</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Tên Sản Phẩm</th>
                            <th>Nguyên Liệu</th>
                            <th class="text-center">Số Lượng</th>
                            <th class="text-end">Đơn Giá Hiện Tại</th>
                            <th class="text-end">Tổng Giá Trị</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function renderInventory(data) {
            const body = document.getElementById('inventoryBody');
            const totalInventoryDisplay = document.getElementById('totalInventoryValue');
            const lowStockDisplay = document.getElementById('lowStockCount');

            if (!body) return;

            let totalValue = 0;
            let lowStock = 0;
            let html = '';

            // Kiểm tra xem dữ liệu có hợp lệ không
            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="6" class="text-center py-5">Không có dữ liệu hàng hóa</td></tr>';
                totalInventoryDisplay.innerText = '0 đ';
                lowStockDisplay.innerText = '0 loại';
                return;
            }

            data.forEach(item => {
                // Lấy thông tin giá từ BangGiaThiTruong
                const nguyenLieu = BangGiaThiTruong[item.MaNL];
                const giaBanHienTai = nguyenLieu ? nguyenLieu.Ban : 0;
                
                // Đơn giá = Giá nguyên liệu * Trọng lượng
                const donGia = giaBanHienTai * item.TrongLuong;
                // Tổng giá trị = Đơn giá * Số lượng tồn kho
                const value = donGia * item.SoLuong;
                
                totalValue += value;
                if(item.SoLuong < 5) lowStock++;

                html += `
                    <tr>
                        <td><code class="text-info">${item.MaHH}</code></td>
                        <td>
                            <div class="fw-bold">${item.Ten}</div>
                            <small class="text-muted">${item.TrongLuong} chỉ</small>
                        </td>
                        <td>
                            <span class="badge bg-secondary opacity-75">
                                ${nguyenLieu ? nguyenLieu.Ten : 'N/A'}
                            </span>
                        </td>
                        <td class="text-center">
                            <span class="${item.SoLuong < 5 ? 'status-low' : 'fw-bold'}">
                                ${item.SoLuong}
                            </span>
                        </td>
                        <td class="text-end text-muted">${donGia.toLocaleString()} đ</td>
                        <td class="text-end fw-bold text-warning">${value.toLocaleString()} đ</td>
                    </tr>
                `;
            });

            body.innerHTML = html;
            totalInventoryDisplay.innerText = totalValue.toLocaleString() + ' đ';
            lowStockDisplay.innerText = lowStock + ' loại';
        }

        function filterInventory() {
            const mCode = document.getElementById('materialFilter').value;
            // Đảm bảo HangHoa đã được load từ data.js
            if (typeof HangHoa !== 'undefined') {
                const filtered = mCode === 'all' ? HangHoa : HangHoa.filter(h => h.MaNL === mCode);
                renderInventory(filtered);
            }
        }

        // Khởi tạo trang khi load xong
        window.onload = () => {
            console.log("Hệ thống đang kiểm tra dữ liệu...");
            if (typeof HangHoa !== 'undefined' && typeof BangGiaThiTruong !== 'undefined') {
                renderInventory(HangHoa);
            } else {
                console.error("LỖI: Không tìm thấy dữ liệu trong data.js. Kiểm tra lại đường dẫn file hoặc khai báo biến.");
                document.getElementById('inventoryBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-5">Lỗi: Không nạp được dữ liệu từ data.js</td></tr>';
            }
        };
    </script>
</body>
</html>
